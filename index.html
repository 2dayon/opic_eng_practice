<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPIc 랜덤 질문 룰렛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes roulette {
            0% { transform: translateY(100%); opacity: 0; }
            10% { transform: translateY(0); opacity: 1; }
            90% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100%); opacity: 0; }
        }
        .roulette-active {
            animation: roulette 0.1s infinite linear;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        
        <div class="flex items-center justify-between mb-6">
            <div class="text-left">
                <label for="type-select" class="block text-[10px] font-bold text-gray-400 mb-1 tracking-wider">유형 선택</label>
                <select id="type-select" onchange="changeType()" class="bg-blue-50 border border-blue-200 text-blue-700 text-xs rounded focus:ring-blue-500 focus:border-blue-500 block w-28 py-1 px-2 outline-none font-bold cursor-pointer shadow-sm transition">
                    <option value="전체">전체 랜덤</option>
                    <option value="설명/묘사">설명 / 묘사</option>
                    <option value="습관">일상 / 습관</option>
                    <option value="과거경험">과거 경험</option>
                    <option value="비교">과거와 비교</option>
                </select>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-800 text-right tracking-tight">OPIc <span class="text-blue-600">실전 연습</span></h1>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-6" id="category-buttons">
            <button onclick="startRoulette('공원가기')" class="bg-gray-100 border border-gray-200 hover:bg-blue-500 hover:text-white py-2.5 px-4 rounded-xl transition font-medium text-gray-700 hover:border-blue-500">🏞️ 공원가기</button>
            <button onclick="startRoulette('음악감상')" class="bg-gray-100 border border-gray-200 hover:bg-blue-500 hover:text-white py-2.5 px-4 rounded-xl transition font-medium text-gray-700 hover:border-blue-500">🎧 음악감상</button>
            <button onclick="startRoulette('영화보기')" class="bg-gray-100 border border-gray-200 hover:bg-blue-500 hover:text-white py-2.5 px-4 rounded-xl transition font-medium text-gray-700 hover:border-blue-500">🍿 영화보기</button>
            <button onclick="startRoulette('카페가기')" class="bg-gray-100 border border-gray-200 hover:bg-blue-500 hover:text-white py-2.5 px-4 rounded-xl transition font-medium text-gray-700 hover:border-blue-500">☕ 카페가기</button>
            <button onclick="startRoulette('롤플레잉')" class="bg-gray-100 border border-gray-200 hover:bg-blue-500 hover:text-white py-2.5 px-4 rounded-xl transition font-medium text-gray-700 hover:border-blue-500">🧜🏻‍♀️ 롤플레잉</button>
            <button onclick="startRoulette('돌발질문')" class="bg-gray-100 border border-gray-200 hover:bg-red-500 hover:text-white py-2.5 px-4 rounded-xl transition font-medium text-gray-700 hover:border-red-500">🚨 돌발질문</button>
        </div>

        <hr class="mb-6 border-gray-200">

        <div class="relative bg-blue-50 rounded-xl p-4 mb-2 min-h-[140px] flex flex-col items-center justify-center overflow-hidden border border-blue-100">
            <p id="roulette-text" class="absolute text-lg font-medium text-gray-400 hidden">질문 뽑는 중...</p>
            <p id="question-text" class="text-lg font-medium text-gray-800 leading-relaxed text-balance transition-opacity duration-300">
                왼쪽 위에서 유형을 고르고<br>주제를 선택해 주세요.
            </p>
            <button id="toggleQuestionBtn" onclick="toggleQuestionText()" class="hidden mt-4 bg-white border border-blue-400 text-blue-600 hover:bg-blue-100 px-4 py-1.5 rounded-full font-medium transition text-sm shadow-sm">
                👀 질문 텍스트 보기
            </button>
        </div>
        
        <div class="flex justify-end mb-4 min-h-[32px]">
            <button id="replayBtn" onclick="replayQuestion()" class="hidden flex items-center gap-1 text-sm bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1.5 rounded-full font-semibold transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" />
                </svg>
                Replay (다시듣기)
            </button>
        </div>

        <div class="text-5xl font-mono font-bold text-gray-800 mb-6" id="timer">00:00</div>

        <div class="mb-6 h-12 flex justify-center items-center">
            <audio id="audio-playback" controls class="hidden w-full h-10 outline-none"></audio>
        </div>

        <div class="flex gap-4">
            <button id="startBtn" onclick="toggleAnswer()" class="flex-1 bg-green-500 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-green-600 transition">답변 시작</button>
            <button onclick="resetAll()" class="flex-1 bg-gray-400 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-gray-500 transition">리셋</button>
        </div>
    </div>

    <script>
        const questionsDB = {
            "공원가기": {
                "설명/묘사": ["You indicated in the survey that you like going to parks. Tell me about the park you visit most often. What does it look like?"],
                "습관": ["What do you usually do at the park? Who do you usually go with? Tell me in detail."],
                "과거경험": ["Tell me about a memorable experience you had at a park recently. What exactly happened, and why was it memorable?"],
                "비교": ["Compare the parks you used to go to when you were young to the ones you visit now. How have they changed?"]
            },
            "음악감상": {
                "설명/묘사": ["What is your favorite genre of music, and who is your favorite musician? Why do you like them?"],
                "습관": ["When and where do you usually listen to music? What kind of device do you use?"],
                "과거경험": ["Tell me about a memorable concert or live music event you attended in the past. Describe the atmosphere."],
                "비교": ["How has your taste in music changed since you were a child? Compare the music you liked then to the music you like now."]
            },
            "돌발질문": {
                "설명/묘사": ["I would like to know about the geography of your country. Tell me about the weather and seasons."],
                "습관": ["What do people in your country usually do during their free time or on weekends?"],
                "과거경험": ["Think about a restaurant or cafe you visited recently. Describe what happened there in detail."],
                "비교": ["How have the transportation systems in your country changed over the last 10 years?"]
            },
            "영화보기": {
                "설명/묘사": ["What kind of movies do you like the most? Why do you like that genre?",
                             "Describe your favorite movie. What is it about and why do you like it?"],
                "습관": ["When do you usually watch movies? Where do you usually watch them?",
                         "Do you prefer watching movies at home or at the theater? What do you usually do while watching a movie?"],
                "과거경험": ["Tell me about the last movie you watched. What was it about and how did you feel about it?",
                            "Describe a memorable experience you had while watching a movie at a theater."],
                "비교": ["How is watching movies at home different from watching movies at a movie theater?",
                        "How has the way people watch movies changed compared to the past?"]
            },
            "카페가기": {
                "설명/묘사": [
                    "Tell me about your favorite cafe. Where is it located, and what does it look like?",
                    "Describe a typical cafe in your country. What do they usually look like and what kind of people go there?"
                ],
                "습관": [
                    "What is your usual routine when you go to a cafe? From entering the door to leaving, tell me everything you do in detail.",
                    "What do you usually order at a cafe? Why do you like that specific drink or dessert?"
                ],
                "과거경험": [
                    "Tell me about the first cafe you ever visited. When was it, and who were you with? How was the experience?",
                    "Describe a memorable experience you had at a cafe. Perhaps something unexpected happened. Tell me the whole story."
                ],
                "비교": [
                    "Why do you think cafes are so popular in Korea? Please explain the reasons why people love going to cafes in your country.",
                    "How have the reasons for visiting cafes changed over time? Compare the reasons people went to cafes in the past with why they visit them today.",
                    "Talk about some issues or concerns people have regarding cafes these days. (e.g., eco-friendly cups, no-kids zones, or rising prices)"
                ]
            },
            "롤플레잉": {
                "상황설명":["You want to go to a new cafe with a friend this weekend. Call your friend and ask three or four questions about the cafe.",
                        "You are at a cafe and you just realized that you received the wrong order. Explain the situation to the server and offer two or three solutions to solve the problem.",
                        "Have you ever had a problem while at a cafe? Perhaps they ran out of what you wanted, or it was too noisy. How did you handle that situation?" ]
            }
                        
        };

        const dummyQuestions = [
            "What is your favorite...", "Tell me about a time...", "Describe the place...", "How often do you...", "Compared to the past...", "Who do you usually...", "When was the last time..."
        ];

        let timerInterval;
        let seconds = 0;
        let isRunning = false;
        let isRolling = false; 
        let currentQuestionText = ""; 
        let isTextVisible = false; 
        
        // [수정됨] 기본 상태를 '전체'로 설정
        let currentType = "전체"; 
        let selectedRandomType = ""; // '전체'일 때 실제로 뽑힌 유형 저장용

        let mediaRecorder;
        let audioChunks = [];
        let audioStream;

        function changeType() {
            const selectBox = document.getElementById("type-select");
            currentType = selectBox.value;
            resetAll(true); 
            document.getElementById('question-text').innerText = `[${currentType}] 유형이 선택되었습니다.\n주제를 골라주세요.`;
        }

        let audioCtx;
        function initAudioContext() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }

        function playBeepAndSpeak(text) {
            initAudioContext();
            window.speechSynthesis.cancel();

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2); 

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);

            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.95; 

                if (voices.length === 0) { voices = window.speechSynthesis.getVoices(); }
                const enVoices = voices.filter(v => v.lang.includes('en-US'));

                if (enVoices.length > 0) {
                    const evaVoice = enVoices.find(v => 
                        v.name.includes('Google US English') || 
                        v.name.includes('Zira') || 
                        v.name.includes('Samantha') || 
                        v.name.includes('Victoria') ||
                        v.name.toLowerCase().includes('female')
                    );
                    utterance.voice = evaVoice || enVoices[0];
                }
                
                window.speechSynthesis.speak(utterance);
            }, 400); 
        }

        let voices = [];
        function loadVoices() { voices = window.speechSynthesis.getVoices(); }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function replayQuestion() {
            if (currentQuestionText !== "") { playBeepAndSpeak(currentQuestionText); }
        }

        // [수정됨] 텍스트 보기를 눌렀을 때 '전체' 모드라면 실제 뽑힌 유형을 보여줌
        function toggleQuestionText() {
            const qText = document.getElementById('question-text');
            const btn = document.getElementById('toggleQuestionBtn');
            
            // 화면에 보여줄 라벨 결정
            const typeLabel = currentType === "전체" ? selectedRandomType : currentType;

            if (isTextVisible) {
                qText.innerText = "🔊 에바의 질문을 듣고 답변을 준비하세요.";
                btn.innerText = "👀 질문 텍스트 보기";
                isTextVisible = false;
            } else {
                qText.innerHTML = `<span class="text-sm font-bold text-blue-500 block mb-1">[${typeLabel}]</span> Q: ${currentQuestionText}`;
                btn.innerText = "🙈 질문 텍스트 숨기기";
                isTextVisible = true;
            }
        }

        function startRoulette(category) {
            if (isRolling) return; 
            isRolling = true;
            
            initAudioContext();
            resetAll(true); 
            
            document.getElementById('replayBtn').classList.add('hidden');
            document.getElementById('toggleQuestionBtn').classList.add('hidden'); 
            
            const qText = document.getElementById('question-text');
            const rText = document.getElementById('roulette-text');
            const buttons = document.querySelectorAll('#category-buttons button');

            qText.classList.add('opacity-0');
            rText.classList.remove('hidden');
            rText.classList.add('roulette-active');
            
            buttons.forEach(b => b.disabled = true);

            let dummyIndex = 0;
            const dummyInterval = setInterval(() => {
                rText.innerText = dummyQuestions[dummyIndex];
                dummyIndex = (dummyIndex + 1) % dummyQuestions.length;
            }, 50); 

            setTimeout(() => {
                clearInterval(dummyInterval); 
                rText.classList.remove('roulette-active');
                rText.classList.add('hidden');

                // [핵심 로직] '전체'가 선택되었으면 4가지 유형 중 하나를 무작위로 뽑음
                let actualType = currentType;
                if (currentType === "전체") {
                    const types = ["설명/묘사", "습관", "과거경험", "비교"];
                    actualType = types[Math.floor(Math.random() * types.length)];
                    selectedRandomType = actualType; // 화면 표시용으로 저장
                }

                // 선택된(혹은 무작위로 뽑힌) 유형과 주제에 맞는 질문 가져오기
                const questions = questionsDB[category][actualType];
                const randomIndex = Math.floor(Math.random() * questions.length);
                currentQuestionText = questions[randomIndex]; 
                
                isTextVisible = false;
                qText.innerText = "🔊 에바의 질문을 듣고 답변을 준비하세요.";
                qText.classList.remove('opacity-0');
                
                const toggleBtn = document.getElementById('toggleQuestionBtn');
                toggleBtn.innerText = "👀 질문 텍스트 보기";
                toggleBtn.classList.remove('hidden');
                
                playBeepAndSpeak(currentQuestionText);
                document.getElementById('replayBtn').classList.remove('hidden');

                isRolling = false;
                buttons.forEach(b => b.disabled = false); 
            }, 1500); 
        }

        async function toggleAnswer() {
            if (isRolling) return; 
            const btn = document.getElementById('startBtn');
            const audioPlayback = document.getElementById('audio-playback');

            if (!isRunning) { 
                seconds = 0;
                updateTimerDisplay();

                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(audioStream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => { audioChunks.push(event.data); };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        audioPlayback.src = audioUrl;
                        audioPlayback.classList.remove('hidden'); 
                    };

                    audioPlayback.classList.add('hidden'); 
                    mediaRecorder.start();
                    
                    window.speechSynthesis.cancel(); 
                    startTimer(); 
                    btn.innerText = "답변 종료"; 
                    btn.classList.replace('bg-green-500', 'bg-red-500'); 
                    isRunning = true;

                } catch (err) {
                    alert("마이크 사용 권한을 허용해야 녹음할 수 있습니다!");
                    console.error("마이크 접근 에러:", err);
                }
                
            } else { 
                stopTimer(); 
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    audioStream.getTracks().forEach(track => track.stop());
                }

                btn.innerText = "다시 답변하기"; 
                btn.classList.replace('bg-red-500', 'bg-green-500'); 
                isRunning = false;
            }
        }

        function startTimer() { timerInterval = setInterval(() => { seconds++; updateTimerDisplay(); }, 1000); }
        function stopTimer() { clearInterval(timerInterval); }
        function resetTimer() { 
            stopTimer(); 
            seconds = 0; 
            isRunning = false; 
            updateTimerDisplay(); 
            const btn = document.getElementById('startBtn');
            btn.innerText = "답변 시작"; 
            btn.className = "flex-1 bg-green-500 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-green-600 transition"; 
        }
        function updateTimerDisplay() { 
            const min = String(Math.floor(seconds / 60)).padStart(2, '0'); 
            const sec = String(seconds % 60).padStart(2, '0'); 
            document.getElementById('timer').innerText = `${min}:${sec}`; 
        }
        
        function resetAll(isFromRoulette = false) { 
            if (isRolling && !isFromRoulette) return; 
            
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                if (audioStream) audioStream.getTracks().forEach(track => track.stop());
            }

            resetTimer(); 
            window.speechSynthesis.cancel(); 
            document.getElementById('audio-playback').classList.add('hidden'); 
            
            if (!isFromRoulette) {
                currentQuestionText = "";
                isTextVisible = false;
                document.getElementById('question-text').innerText = "왼쪽 위에서 유형을 고르고\n주제를 선택해 주세요."; 
                document.getElementById('replayBtn').classList.add('hidden');
                document.getElementById('toggleQuestionBtn').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
